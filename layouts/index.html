{{ define "main" }}
<article class="doc">
  <div class="doc-header">
    <h1 class="doc-title">{{ .Title }}</h1>
    <p class="doc-lead">{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}</p>
  </div>
  <div class="rule"></div>
  <div class="prose">
    {{ .Content }}
  </div>
</article>
{{ end }}
