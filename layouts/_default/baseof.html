<!DOCTYPE html>
<html lang="{{ site.Language.Locale | default "en" }}">
{{ partial "head.html" . }}
<body>
  <div class="page{{ if .Site.Params.sprocketHoles }} has-sprockets{{ end }}">
    {{ if .Site.Params.sprocketHoles }}<div class="sprockets" aria-hidden="true"></div>{{ end }}
    {{ partial "header.html" . }}
    <div class="layout">
      {{ partial "sidebar.html" . }}
      <main class="content" id="main">
        {{ block "main" . }}{{ end }}
      </main>
    </div>
    {{ partial "footer.html" . }}
  </div>
  <script>
    // Theme toggle: flips the effective theme and remembers the choice.
    (function () {
      var btn = document.getElementById("theme-toggle");
      if (!btn) return;
      btn.addEventListener("click", function () {
        var root = document.documentElement;
        var set = root.getAttribute("data-theme");
        var isDark = set
          ? set === "dark"
          : window.matchMedia("(prefers-color-scheme: dark)").matches;
        var next = isDark ? "light" : "dark";
        root.setAttribute("data-theme", next);
        try { localStorage.setItem("theme", next); } catch (e) {}
      });
    })();
  </script>
</body>
</html>
