baseURL = "https://example.org/"
locale = "en-US"
title = "API Reference"
enableRobotsTXT = true

# The theme is imported as a Hugo Module.
# The `replacements` line makes this exampleSite resolve it from the repo checkout (two levels up)
# instead of the network — drop it when using this config as a starting point for your site.
[module]
  replacements = "github.com/YouSysAdmin/hugo-theme-api-ref -> ../.."
  [[module.imports]]
    path = "github.com/YouSysAdmin/hugo-theme-api-ref"

# Fall back to the file modification time for pages without a date,
# so "UPDATED" in the doc header is never empty.
[frontmatter]
  date    = ["date", ":fileModTime"]
  lastmod = ["lastmod", ":fileModTime", ":default"]

# Render Markdown as close to the source as possible.
[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false
    lineNos = false
    tabWidth = 2
    style = "bw"

[params]
  # Decorative tractor-feed / punch holes down the left margin (datasheet look).
  sprocketHoles = true

  # Masthead metadata, shown in the bordered header box.
  # status and baseURL come from each version's _index.md front matter (content/docs/<version>/).
  # The params below are optional fallbacks, only used when a version omits them — or, for `version`,
  # when the site has no versioned docs sections at all (then a plain label replaces the selector).
  #version = "v1.0.0"
  #status  = "STABLE"
  #baseURL = "https://api.example.org/v2"
  org        = "AFU & CO."
  document   = "API-REF"
  description = "A monospace, datasheet-style reference for the Example REST API."

# Sidebar navigation is generated by the theme: Overview, then the pages of the
# active docs version (content/docs/<version>/, ordered by weight), then Changelog.
